<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password - WorkOut</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow p-6 w-full max-w-md">
    <h1 class="text-2xl font-bold mb-2">Reset password</h1>
    <p class="text-gray-600 mb-6">Choose a new password for your account.</p>

    <form id="resetForm" class="space-y-4">
      <input type="hidden" id="token" />
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="email">Email</label>
        <input id="email" type="email" readonly class="w-full border border-gray-300 rounded-md p-2 bg-gray-100" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="newPassword">New password</label>
        <input id="newPassword" type="password" minlength="8" required class="w-full border border-gray-300 rounded-md p-2" />
        <p class="text-xs text-gray-500 mt-1">At least 8 characters.</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="confirmPassword">Confirm new password</label>
        <input id="confirmPassword" type="password" minlength="8" required class="w-full border border-gray-300 rounded-md p-2" />
      </div>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-md transition">Reset password</button>
    </form>

    <div id="status" class="mt-4 text-sm hidden"></div>
    <div id="successActions" class="mt-6 hidden text-center">
      <a href="/" class="text-blue-600 hover:underline font-medium">Sign in</a>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      document.getElementById('email').value = params.get('email') || '';
      document.getElementById('token').value = params.get('token') || '';

      document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const status = document.getElementById('status');
        status.classList.add('hidden');

        const email = document.getElementById('email').value;
        const token = document.getElementById('token').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (newPassword !== confirmPassword) {
          status.textContent = 'Passwords do not match.';
          status.className = 'mt-4 text-sm text-red-600';
          status.classList.remove('hidden');
          return;
        }

        try {
          const response = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, token, newPassword })
          });

          if (!response.ok) {
            const data = await response.json().catch(() => ({}));
            const msg = data.errors ? data.errors.join('\n') : 'Could not reset password.';
            status.textContent = msg;
            status.className = 'mt-4 text-sm text-red-600';
            status.classList.remove('hidden');
            return;
          }

          status.textContent = 'Password reset successfully. You can now sign in.';
          status.className = 'mt-4 text-sm text-green-600';
          status.classList.remove('hidden');
          document.getElementById('resetForm').classList.add('hidden');
          document.getElementById('successActions').classList.remove('hidden');
        } catch (err) {
          status.textContent = 'Error: ' + err.message;
          status.className = 'mt-4 text-sm text-red-600';
          status.classList.remove('hidden');
        }
      });
    });
  </script>
</body>
</html>
