<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1e3a8a" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <title>History - WorkOut</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen has-bottom-nav">
  <div class="max-w-4xl mx-auto px-4 py-8">
    <header class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
      <div>
        <h1 class="text-3xl font-extrabold tracking-tight text-blue-900">Workout history</h1>
        <p class="text-gray-600 mt-1">See what you've completed and how you're progressing.</p>
      </div>
      <div class="hidden md:flex items-center gap-3">
        <a href="/" class="text-sm text-blue-600 hover:underline font-medium">Planner</a>
        <a href="/workout.html" class="text-sm text-blue-600 hover:underline font-medium">Runner</a>
      </div>
    </header>

    <section id="loginSection" class="bg-white rounded-xl shadow p-6 max-w-md">
      <h2 class="text-xl font-bold mb-4">Sign in required</h2>
      <p class="text-gray-700 mb-4">Taking you to the main page to sign in...</p>
      <a id="loginLink" href="/" class="block w-full text-center bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-md transition">Sign in now</a>
    </section>

    <section id="historySection" class="hidden">
      <div id="summary" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-xl shadow p-4 text-center">
          <div id="statWorkouts" class="text-3xl font-bold text-blue-700">0</div>
          <div class="text-sm text-gray-600">Workouts</div>
        </div>
        <div class="bg-white rounded-xl shadow p-4 text-center">
          <div id="statMinutes" class="text-3xl font-bold text-blue-700">0</div>
          <div class="text-sm text-gray-600">Minutes</div>
        </div>
        <div class="bg-white rounded-xl shadow p-4 text-center">
          <div id="statSets" class="text-3xl font-bold text-blue-700">0</div>
          <div class="text-sm text-gray-600">Sets</div>
        </div>
        <div class="bg-white rounded-xl shadow p-4 text-center">
          <div id="statReps" class="text-3xl font-bold text-blue-700">0</div>
          <div class="text-sm text-gray-600">Reps</div>
        </div>
      </div>

      <div id="sessionsList" class="bg-white rounded-xl shadow overflow-hidden">
        <p class="p-4 text-sm text-gray-500">Loading sessions...</p>
      </div>
    </section>
  </div>

  <section id="sessionModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-lg mx-4 max-h-[80vh] flex flex-col">
      <div class="flex justify-between items-center mb-4">
        <h2 id="sessionModalTitle" class="text-xl font-bold">Session details</h2>
        <button id="closeSessionModal" class="text-gray-500 hover:text-gray-700 text-xl leading-none">&times;</button>
      </div>
      <div id="sessionModalBody" class="overflow-y-auto flex-1"></div>
    </div>
  </section>

  <nav id="bottomNav" class="bottom-nav no-print" aria-label="Main">
    <a href="/" class="bottom-nav__item" data-nav="planner">
      <span class="bottom-nav__icon" aria-hidden="true">📋</span>
      <span>Planner</span>
    </a>
    <a href="/history.html" class="bottom-nav__item" data-nav="history">
      <span class="bottom-nav__icon" aria-hidden="true">📈</span>
      <span>History</span>
    </a>
    <a href="/workout.html" class="bottom-nav__item" data-nav="run">
      <span class="bottom-nav__icon" aria-hidden="true">▶</span>
      <span>Run</span>
    </a>
    <a href="/?open=account" class="bottom-nav__item" data-nav="account">
      <span class="bottom-nav__icon" aria-hidden="true">👤</span>
      <span>Account</span>
    </a>
  </nav>

  <script src="js/site.js"></script>
  <script src="js/history.js"></script>
</body>
</html>
